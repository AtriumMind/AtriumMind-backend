name: Seed Testnet Catalog
on:
  workflow_dispatch:
jobs:
  seed:
    name: Backend + DB seed + catalog verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atrium
          POSTGRES_PASSWORD: atrium
          POSTGRES_DB: atriumind
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 5s --health-retries 10
    env:
      NODE_ENV: test
      PORT: 3000
      BASE_URL: http://localhost:3000
      DATABASE_URL: postgres://atrium:atrium@localhost:5432/atriumind
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_SERVICE_KEY: placeholder_key_for_testnet_ci
      SUPABASE_STORAGE_BUCKET: resources
      STELLAR_NETWORK: testnet
      NETWORK: testnet
      SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
      USDC_CONTRACT_ID: CBIELTK6YBZJU5UP2WWQEUCYKLPU6AUNZ2BQ4WWFEIE3USCIHMXQDAMA
      FACILITATOR_URL: https://www.x402.org/facilitator
      PAY_TO: GCK7ALS7EP5DQG4UZMON3XTNUE7SSIW27XW24UOLXDHBOHWEWIGZVPZF
      AGENT_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
      REGISTRY_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
      VAULT_REGISTRY_CONTRACT_ID: CBQEIMSRPSRKJJHGOELZTP3CISZVHZ6WPKZTWJMYZXHFXPGHHWFQBD4H
      REGISTRY_CONTRACT_ID: CBQEIMSRPSRKJJHGOELZTP3CISZVHZ6WPKZTWJMYZXHFXPGHHWFQBD4H
      OPENROUTER_API_KEY: placeholder_not_used_for_catalog
      ADMIN_API_KEY: atrium-admin-2025-xK9mP3nQ8rL2vB7s
      ALLOWED_ORIGINS: "*"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install --workspaces --include-workspace-root --legacy-peer-deps
      - name: Run SQL migrations
        run: |
          for f in $(ls drizzle/*.sql | sort); do
            PGPASSWORD=atrium psql -h 127.0.0.1 -U atrium -d atriumind -f "$f" 2>&1 | tail -1 || true
          done
      - name: Seed via SQL
        run: |
          PGPASSWORD=atrium psql -h 127.0.0.1 -U atrium -d atriumind << 'SQL'
          INSERT INTO publishers (id, name, email, wallet_address, api_key_hash, created_at)
          VALUES
            ('pub_001', 'AtriumMind Research Lab', 'research@atriumind.demo',
             'GDEJJLXV2CNHF5HEGX34MU4G6L4PRVUAGD4ANF77ZDYTQJKSDSDYVVI6',
             'ak_placeholder_1', NOW()),
            ('pub_002', 'AtriumMind Data Studio', 'data@atriumind.demo',
             'GBXL7OEOSVNSESHD7Q2BYVVA2KPQLSSIRLDSY6HFNYPXHCEBKPNCJQKX',
             'ak_placeholder_2', NOW())
          ON CONFLICT DO NOTHING;
          INSERT INTO resources (id, publisher_id, title, description, price, resource_type,
                                  access_url, external_url, listed, verification_status,
                                  onchain_status, wallet_address, created_at)
          VALUES
            ('res_001', 'pub_001', 'Soroban Smart Contract Patterns (2025)',
             'Production-tested Soroban patterns with annotated Rust source.',
             '0.50', 'link', 'http://localhost:3000/resources/res_001/access',
             'https://developers.stellar.org/docs/build/smart-contracts/example-contracts',
             true, 'verified', 'registered',
             'GDEJJLXV2CNHF5HEGX34MU4G6L4PRVUAGD4ANF77ZDYTQJKSDSDYVVI6', NOW()),
            ('res_002', 'pub_002', 'Stellar Network Analytics Q1 2025',
             '90-day Stellar on-chain metrics in CSV: accounts, payments, DEX.',
             '1.00', 'link', 'http://localhost:3000/resources/res_002/access',
             'https://dashboard.stellar.org', true, 'verified', 'registered',
             'GBXL7OEOSVNSESHD7Q2BYVVA2KPQLSSIRLDSY6HFNYPXHCEBKPNCJQKX', NOW()),
            ('res_003', 'pub_001', 'x402 HTTP Payment Protocol Guide',
             'Complete x402 integration with Node.js and React examples.',
             '0.25', 'link', 'http://localhost:3000/resources/res_003/access',
             'https://github.com/x402-org/x402', true, 'verified', 'none',
             'GDEJJLXV2CNHF5HEGX34MU4G6L4PRVUAGD4ANF77ZDYTQJKSDSDYVVI6', NOW())
          ON CONFLICT DO NOTHING;
          SELECT 'publishers' AS tbl, COUNT(*)::text FROM publishers
          UNION ALL SELECT 'resources', COUNT(*)::text FROM resources;
          SQL
      - name: Build
        run: npm run build
      - name: Start server (non-blocking)
        run: |
          nohup node dist/index.js > /tmp/server.log 2>&1 &
          sleep 15
          echo "=== SERVER LOG (first 60 lines) ==="
          head -60 /tmp/server.log || true
          echo "=== END LOG ==="
          # Check if still running
          pgrep -f "node dist/index.js" && echo "Server process alive" || echo "Server process DIED"
      - name: Verify catalog (if server alive)
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || echo "0")
          echo "Health HTTP status: $CODE"
          if [ "$CODE" = "200" ]; then
            echo "=== /resources ==="
            curl -s http://localhost:3000/resources | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          items=d.get('resources',d.get('data',d if isinstance(d,list) else []))
          print(f'CATALOG: {len(items)} resources')
          for r in items:
            print(f'  {r.get(\"title\",\"?\")} @ {r.get(\"price\",\"?\")} USDC')
            "
            echo "=== /admin/stats ==="
            curl -s http://localhost:3000/admin/stats -H 'X-Admin-Key: atrium-admin-2025-xK9mP3nQ8rL2vB7s'
            echo "::notice::Backend running - catalog verified"
          else
            echo "Server not responding on :3000"
            echo "Full server log:"
            cat /tmp/server.log || true
          fi
      - name: Summary
        if: always()
        run: |
          echo "## AtriumMind Backend" >> $GITHUB_STEP_SUMMARY
          echo "- Migrations: done" >> $GITHUB_STEP_SUMMARY
          echo "- DB seed: 2 publishers, 3 resources" >> $GITHUB_STEP_SUMMARY
          echo "- Build: done (see logs for runtime status)" >> $GITHUB_STEP_SUMMARY
