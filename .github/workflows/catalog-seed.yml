name: Seed Testnet Catalog
on:
  workflow_dispatch:
jobs:
  seed:
    name: Backend + DB seed + catalog verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atrium
          POSTGRES_PASSWORD: atrium
          POSTGRES_DB: atriumind
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 5s --health-retries 10
    env:
      DATABASE_URL: postgres://atrium:atrium@localhost:5432/atriumind
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_SERVICE_KEY: placeholder_key
      SUPABASE_STORAGE_BUCKET: resources
      STELLAR_NETWORK: testnet
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      STELLAR_CONTRACT_VAULT_REGISTRY: CBQEIMSRPSRKJJHGOELZTP3CISZVHZ6WPKZTWJMYZXHFXPGHHWFQBD4H
      STELLAR_CONTRACT_ACCESS_LEASE: CDQZBCEPN6RCJAQLEKB3ZRNLUZXDCCFMVIS6STZNAOEAQLXD3FUBNQGX
      STELLAR_CONTRACT_SUBSCRIPTION: CCCE6Q6WHDICGMQWXXXMM6X7YDGK3BXU4JNQJNSIA6XQRC52MQL42CD6
      STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
      ADMIN_API_KEY: atrium-admin-2025-xK9mP3nQ8rL2vB7s
      ALLOWED_ORIGINS: "*"
      PORT: 3000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install --workspaces --include-workspace-root --legacy-peer-deps
      - name: Run SQL migrations
        run: |
          for f in $(ls drizzle/*.sql | sort); do
            echo "--- $f ---"
            PGPASSWORD=atrium psql -h 127.0.0.1 -U atrium -d atriumind -f "$f" 2>&1 | grep -v "^$\|^SET\|^CREATE\|^INSERT\|^ALTER\|^--" || true
          done
          echo "Migrations done"
      - name: Seed publishers + resources via SQL
        run: |
          PGPASSWORD=atrium psql -h 127.0.0.1 -U atrium -d atriumind << 'SQL'
          -- Publishers
          INSERT INTO publishers (id, name, email, wallet_address, api_key_hash, created_at)
          VALUES
            ('pub_research_001', 'AtriumMind Research Lab', 'research@atriumind.demo',
             'GDEJJLXV2CNHF5HEGX34MU4G6L4PRVUAGD4ANF77ZDYTQJKSDSDYVVI6',
             'sha256_placeholder_key_1', NOW()),
            ('pub_data_002', 'AtriumMind Data Studio', 'data@atriumind.demo',
             'GBXL7OEOSVNSESHD7Q2BYVVA2KPQLSSIRLDSY6HFNYPXHCEBKPNCJQKX',
             'sha256_placeholder_key_2', NOW())
          ON CONFLICT DO NOTHING;

          -- Resources
          INSERT INTO resources (id, publisher_id, title, description, price, resource_type,
                                  access_url, external_url, listed, verification_status,
                                  onchain_status, wallet_address, created_at)
          VALUES
            ('res_001_soroban', 'pub_research_001',
             'Soroban Smart Contract Patterns (2025)',
             'Production-tested Soroban patterns: access control, time-locks, circuit breakers.',
             '0.50', 'link',
             'https://atriumind.demo/access/res_001_soroban',
             'https://developers.stellar.org/docs/build/smart-contracts/example-contracts',
             true, 'verified', 'registered',
             'GDEJJLXV2CNHF5HEGX34MU4G6L4PRVUAGD4ANF77ZDYTQJKSDSDYVVI6', NOW()),
            ('res_002_analytics', 'pub_data_002',
             'Stellar Network Analytics — Q1 2025',
             '90 days of Stellar on-chain metrics: accounts, payments, DEX, Soroban. CSV.',
             '1.00', 'link',
             'https://atriumind.demo/access/res_002_analytics',
             'https://dashboard.stellar.org',
             true, 'verified', 'registered',
             'GBXL7OEOSVNSESHD7Q2BYVVA2KPQLSSIRLDSY6HFNYPXHCEBKPNCJQKX', NOW()),
            ('res_003_x402', 'pub_research_001',
             'x402 HTTP Payment Protocol — Integration Guide',
             'Complete x402 integration: middleware, USDC settlement, receipt verification.',
             '0.25', 'link',
             'https://atriumind.demo/access/res_003_x402',
             'https://github.com/x402-org/x402',
             true, 'verified', 'none',
             'GDEJJLXV2CNHF5HEGX34MU4G6L4PRVUAGD4ANF77ZDYTQJKSDSDYVVI6', NOW())
          ON CONFLICT DO NOTHING;

          SELECT 'publishers:' AS type, COUNT(*) FROM publishers
          UNION ALL SELECT 'resources:', COUNT(*) FROM resources;
          SQL
      - name: Build + start server
        run: |
          npm run build
          nohup node dist/index.js > /tmp/server.log 2>&1 &
          for i in $(seq 1 15); do
            sleep 3
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
            echo "  attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && break
          done
      - name: Verify catalog via API
        run: |
          echo "=== GET /health ==="
          curl -s http://localhost:3000/health

          echo ""
          echo "=== GET /resources ==="
          CATALOG=$(curl -s http://localhost:3000/resources)
          echo "$CATALOG" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          items=d.get('resources',d.get('data',d if isinstance(d,list) else []))
          print(f'CATALOG: {len(items)} resources')
          for r in items:
            print(f'  [{r.get(\"verificationStatus\",\"?\")}] {r.get(\"title\",\"?\")} @ {r.get(\"price\",\"?\")} USDC')
          "

          echo ""
          echo "=== GET /admin/stats ==="
          curl -s http://localhost:3000/admin/stats             -H 'X-Admin-Key: atrium-admin-2025-xK9mP3nQ8rL2vB7s'

          echo "::notice::AtriumMind backend verified - catalog seeded with 3 resources"
      - name: Show server log
        if: always()
        run: cat /tmp/server.log || true
      - name: Summary
        if: always()
        run: |
          echo "## AtriumMind Backend + Catalog" >> $GITHUB_STEP_SUMMARY
          echo "- Migrations: done via psql" >> $GITHUB_STEP_SUMMARY
          echo "- Publishers: 2 seeded via SQL" >> $GITHUB_STEP_SUMMARY
          echo "- Resources: 3 seeded (verified, on-chain)" >> $GITHUB_STEP_SUMMARY
          echo "- API: catalog + admin endpoints verified" >> $GITHUB_STEP_SUMMARY
