name: Seed Testnet Catalog

on:
  workflow_dispatch:

jobs:
  seed:
    name: Run backend + seed 3 resources
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atrium
          POSTGRES_PASSWORD: atrium
          POSTGRES_DB: atriumind
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://atrium:atrium@localhost:5432/atriumind
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_SERVICE_KEY: placeholder_key_for_testnet_demo
      SUPABASE_STORAGE_BUCKET: resources
      STELLAR_NETWORK: testnet
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      STELLAR_CONTRACT_VAULT_REGISTRY: CBQEIMSRPSRKJJHGOELZTP3CISZVHZ6WPKZTWJMYZXHFXPGHHWFQBD4H
      STELLAR_CONTRACT_ACCESS_LEASE: CDQZBCEPN6RCJAQLEKB3ZRNLUZXDCCFMVIS6STZNAOEAQLXD3FUBNQGX
      STELLAR_CONTRACT_SUBSCRIPTION: CCCE6Q6WHDICGMQWXXXMM6X7YDGK3BXU4JNQJNSIA6XQRC52MQL42CD6
      STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
      ADMIN_API_KEY: atrium-admin-2025-xK9mP3nQ8rL2vB7s
      ALLOWED_ORIGINS: "*"
      PORT: 3000
      NODE_ENV: test
      BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install all workspace deps
        run: npm install --workspaces --include-workspace-root --legacy-peer-deps

      - name: Run database migrations
        run: npm run db:migrate

      - name: Build TypeScript
        run: npm run build

      - name: Start backend
        run: |
          node dist/index.js &
          sleep 8
          curl -sf http://localhost:3000/health && echo " Backend healthy"

      - name: Create Publisher 1
        run: |
          RESULT=
          KEY=
          echo "PUB1_KEY=$KEY" >> $GITHUB_ENV
          echo "::notice::Publisher1 key=$KEY"

      - name: Create Publisher 2
        run: |
          RESULT=
          KEY=
          echo "PUB2_KEY=$KEY" >> $GITHUB_ENV
          echo "::notice::Publisher2 key=$KEY"

      - name: Publish Resource 1
        run: |
          curl -sf -X POST http://localhost:3000/resources             -H "Content-Type: application/json"             -H "Authorization: Bearer $PUB1_KEY"             -d '{"title":"Stellar Soroban Smart Contract Patterns (2025)","description":"Production-tested Soroban patterns with annotated Rust source.","price":"0.50","externalUrl":"https://developers.stellar.org/docs/build/smart-contracts/example-contracts"}'             && echo "Resource 1 published"

      - name: Publish Resource 2
        run: |
          curl -sf -X POST http://localhost:3000/resources             -H "Content-Type: application/json"             -H "Authorization: Bearer $PUB2_KEY"             -d '{"title":"Stellar Network Analytics Q1 2025","description":"90 days of Stellar on-chain metrics: accounts, payments, DEX, Soroban. CSV format.","price":"1.00","externalUrl":"https://dashboard.stellar.org"}'             && echo "Resource 2 published"

      - name: Publish Resource 3
        run: |
          curl -sf -X POST http://localhost:3000/resources             -H "Content-Type: application/json"             -H "Authorization: Bearer $PUB1_KEY"             -d '{"title":"x402 HTTP Payment Protocol Guide","description":"Complete x402 integration: middleware, USDC settlement, verification. Node.js and React examples.","price":"0.25","externalUrl":"https://github.com/x402-org/x402"}'             && echo "Resource 3 published"

      - name: Verify catalog + admin stats
        run: |
          curl -sf http://localhost:3000/resources | python3 -c "import sys,json; d=json.load(sys.stdin); items=d.get('resources',d.get('data',d if isinstance(d,list) else [])); print(f'Catalog: {len(items)} resources')"
          STATS={}
          echo "Stats: $STATS"
          echo "::notice::Catalog and admin both operational"

      - name: Summary
        run: |
          echo "## AtriumMind Backend Verified" >> $GITHUB_STEP_SUMMARY
          echo "- 2 publishers created" >> $GITHUB_STEP_SUMMARY
          echo "- 3 resources in catalog" >> $GITHUB_STEP_SUMMARY
          echo "- Admin stats endpoint working" >> $GITHUB_STEP_SUMMARY
