name: Seed Testnet Catalog

on:
  workflow_dispatch:

jobs:
  seed:
    name: Run backend + seed 3 resources
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atrium
          POSTGRES_PASSWORD: atrium
          POSTGRES_DB: atriumind
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://atrium:atrium@localhost:5432/atriumind
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_SERVICE_KEY: placeholder_key_for_testnet_demo
      SUPABASE_STORAGE_BUCKET: resources
      STELLAR_NETWORK: testnet
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      STELLAR_CONTRACT_VAULT_REGISTRY: CBQEIMSRPSRKJJHGOELZTP3CISZVHZ6WPKZTWJMYZXHFXPGHHWFQBD4H
      STELLAR_CONTRACT_ACCESS_LEASE: CDQZBCEPN6RCJAQLEKB3ZRNLUZXDCCFMVIS6STZNAOEAQLXD3FUBNQGX
      STELLAR_CONTRACT_SUBSCRIPTION: CCCE6Q6WHDICGMQWXXXMM6X7YDGK3BXU4JNQJNSIA6XQRC52MQL42CD6
      STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
      ADMIN_API_KEY: atrium-admin-2025-xK9mP3nQ8rL2vB7s
      ALLOWED_ORIGINS: "*"
      PORT: 3000
      NODE_ENV: test
      BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run database migrations
        run: npx drizzle-kit migrate

      - name: Build TypeScript
        run: npm run build

      - name: Start backend server
        run: |
          node dist/index.js &
          sleep 8
          curl -sf http://localhost:3000/health && echo "\n✅ Backend healthy"

      - name: Create Publisher 1 — AtriumMind Research Lab
        run: |
          RESULT=$(curl -sf -X POST http://localhost:3000/publishers \
            -H "Content-Type: application/json" \
            -d '{"name":"AtriumMind Research Lab","email":"research@atriumind.demo","walletAddress":"GDEJJLXV2CNHF5HEGX34MU4G6L4PRVUAGD4ANF77ZDYTQJKSDSDYVVI6"}')
          echo "$RESULT"
          API_KEY=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('apiKey',''))")
          echo "PUB1_KEY=$API_KEY" >> $GITHUB_ENV
          echo "::notice::Publisher1 API key=$API_KEY"

      - name: Create Publisher 2 — AtriumMind Data Studio
        run: |
          RESULT=$(curl -sf -X POST http://localhost:3000/publishers \
            -H "Content-Type: application/json" \
            -d '{"name":"AtriumMind Data Studio","email":"data@atriumind.demo","walletAddress":"GBXL7OEOSVNSESHD7Q2BYVVA2KPQLSSIRLDSY6HFNYPXHCEBKPNCJQKX"}')
          echo "$RESULT"
          API_KEY=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('apiKey',''))")
          echo "PUB2_KEY=$API_KEY" >> $GITHUB_ENV
          echo "::notice::Publisher2 API key=$API_KEY"

      - name: Publish Resource 1 — Soroban Smart Contract Patterns
        run: |
          curl -sf -X POST http://localhost:3000/resources \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $PUB1_KEY" \
            -d '{"title":"Stellar Soroban Smart Contract Patterns (2025)","description":"Production-tested Soroban patterns: access control, upgradeable proxies, time-locks, circuit breakers, and multi-sig.","price":"0.50","externalUrl":"https://developers.stellar.org/docs/build/smart-contracts/example-contracts"}' \
            && echo "\n✅ Resource 1 published"

      - name: Publish Resource 2 — Stellar Network Analytics Dataset
        run: |
          curl -sf -X POST http://localhost:3000/resources \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $PUB2_KEY" \
            -d '{"title":"Stellar Network Analytics — Q1 2025","description":"90 days of on-chain Stellar metrics: active accounts, payment volume, DEX trades, Soroban invocations. CSV format.","price":"1.00","externalUrl":"https://dashboard.stellar.org"}' \
            && echo "\n✅ Resource 2 published"

      - name: Publish Resource 3 — x402 Integration Guide
        run: |
          curl -sf -X POST http://localhost:3000/resources \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $PUB1_KEY" \
            -d '{"title":"x402 HTTP Payment Protocol — Integration Guide","description":"Complete guide to x402 micropayments on Stellar: middleware setup, USDC settlement, receipt verification. Node.js + React examples.","price":"0.25","externalUrl":"https://github.com/x402-org/x402"}' \
            && echo "\n✅ Resource 3 published"

      - name: Verify catalog
        run: |
          CATALOG=$(curl -sf http://localhost:3000/resources)
          echo "$CATALOG" | python3 -c "import sys,json; d=json.load(sys.stdin); items=d.get('resources',d.get('data',d if isinstance(d,list) else [])); print(f'Catalog: {len(items)} resources')"
          echo "::notice::Backend running, catalog seeded with 3 resources"

      - name: Admin stats
        run: |
          STATS=$(curl -sf http://localhost:3000/admin/stats -H "X-Admin-Key: atrium-admin-2025-xK9mP3nQ8rL2vB7s" || echo '{}')
          echo "Stats: $STATS"

      - name: Summary
        run: |
          echo "## ✅ AtriumMind Backend + Catalog Working" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 2 publishers registered" >> $GITHUB_STEP_SUMMARY
          echo "- 3 resources seeded in catalog" >> $GITHUB_STEP_SUMMARY
          echo "- Admin stats endpoint operational" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**To deploy live:** Set DATABASE_URL + SUPABASE credentials and deploy via Railway" >> $GITHUB_STEP_SUMMARY
