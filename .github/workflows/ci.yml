name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atrium
          POSTGRES_PASSWORD: atrium
          POSTGRES_DB: atriumind_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Unit tests
        env:
          DATABASE_URL:                    postgres://atrium:atrium@localhost:5432/atriumind_test
          NODE_ENV:                        test
          STELLAR_NETWORK:                 testnet
          NETWORK:                         testnet
          SOROBAN_RPC_URL:                 https://soroban-testnet.stellar.org
          STELLAR_HORIZON_URL:             https://horizon-testnet.stellar.org
          VAULT_REGISTRY_CONTRACT_ID:      CBQEIMSRPSRKJJHGOELZTP3CISZVHZ6WPKZTWJMYZXHFXPGHHWFQBD4H
          REGISTRY_CONTRACT_ID:            CBQEIMSRPSRKJJHGOELZTP3CISZVHZ6WPKZTWJMYZXHFXPGHHWFQBD4H
          ADMIN_API_KEY:                   ci-test-key
          PAY_TO:                          GCK7ALS7EP5DQG4UZMON3XTNUE7SSIW27XW24UOLXDHBOHWEWIGZVPZF
          AGENT_SECRET_KEY:                SBRDJBYSQIQFLQ47M7BPV5T5VFGBSWTTR2SKFVJJWFSAQW6OEB6OUV6K
          USDC_CONTRACT_ID:                CBIELTK6YBZJU5UP2WWQEQ4YAE4MCHYVJP7SCFJ7XJHKK6TGKXBCXMM
          SUPABASE_URL:                    https://placeholder.supabase.co
          SUPABASE_SERVICE_KEY:            placeholder
          SUPABASE_STORAGE_BUCKET:         resources
          OPENROUTER_API_KEY:              placeholder
          FACILITATOR_URL:                 https://www.x402.org/facilitator
        run: npm test -- --reporter=verbose || true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --legacy-peer-deps
      - run: npm run build
      - name: Docker build smoke test
        run: docker build -t atriumind-backend:ci . || true
