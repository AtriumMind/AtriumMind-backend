name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + Type check + Tests ────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: atrium
          POSTGRES_PASSWORD: atrium
          POSTGRES_DB: atriumind_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        env:
          DATABASE_URL:        postgres://atrium:atrium@localhost:5432/atriumind_test
          NODE_ENV:            test
          STELLAR_NETWORK:     testnet
          STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
          ADMIN_API_KEY:       ci-test-key
        run: pnpm test -- --reporter=verbose

  # ── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Docker build (smoke test)
        run: docker build -t atriumind-backend:ci .

  # ── Deploy (main only) ───────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/atriumind-backend:latest
            ghcr.io/${{ github.repository_owner }}/atriumind-backend:${{ github.sha }}

      - name: Deploy to Railway / Render
        # Replace with your actual deploy hook
        run: |
          curl -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" || true
